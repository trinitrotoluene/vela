name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push to GHCR (:next)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Apply SDK patch
        run: |
          cd src/SpacetimeDB.ClientSDK
          git apply ../../patches/spacetimedb-cacheless.patch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image tag
        id: meta
        run: |
          TAG=$(echo "${{ github.sha }}" | head -c 7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:next
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            nuget_token=${{ secrets.GITHUB_TOKEN }}
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0.x"
      - name: Generate JSON Schema
        run: dotnet run --project src/Vela.Gen -- generate-json-schema --outDir ./schema-output
      - name: Upload JSON Schema Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: json-schema-files
          path: ./schema-output
