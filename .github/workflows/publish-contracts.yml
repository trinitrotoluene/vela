name: Publish Vela.Contracts

on:
  push:
    branches: [master]
    paths:
      - "src/Vela.Contracts/**"
  pull_request:
    branches: [master]
    paths:
      - "src/Vela.Contracts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0.x"
          source-url: https://nuget.pkg.github.com/trinitrotoluene/index.json

      - name: Restore
        run: dotnet restore src/Vela.Contracts/Vela.Contracts.csproj

      - name: Build
        run: dotnet build src/Vela.Contracts/Vela.Contracts.csproj -c Release --no-restore

  publish:
    name: Pack and Publish
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0.x"
          source-url: https://nuget.pkg.github.com/trinitrotoluene/index.json

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api "/users/${{ github.repository_owner }}/packages/nuget/Vela.Contracts/versions" \
            --jq '.[0].name' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            NEXT=1
          else
            CURRENT=$(echo "$LATEST" | cut -d. -f2)
            NEXT=$((CURRENT + 1))
          fi
          echo "value=0.${NEXT}.0" >> "$GITHUB_OUTPUT"
          echo "Publishing Vela.Contracts 0.${NEXT}.0"

      - name: Pack
        run: |
          dotnet pack src/Vela.Contracts/Vela.Contracts.csproj \
            -c Release \
            -p:PackageVersion=${{ steps.version.outputs.value }} \
            --output ./nupkgs

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
